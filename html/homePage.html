<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Catcher 🐶</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div id="startScreen">
        <h1>Dog Catcher 🐶</h1>
        <div id="nameForm">
            <div id="nameForm">
                <input type="text" id="playerName" class="input-field" placeholder="Username" autocomplete="off" />
                <input type="password" id="playerPassword" class="input-field" placeholder="Password" />
            </div>
            <button id="startButton" class="pulse-button small-button">
                Start Game <span class="arrow">→</span>
            </button>
        </div>
    </div>

    <div id="popup2" class="popup">
        <div class="popup-content">
            <button id="popupClose" class="popup-close">X</button>
            <p id="popupMessage">Your message here</p>
        </div>
    </div>

    <script src="../js/homePage.js"></script>
</body>

</html>
