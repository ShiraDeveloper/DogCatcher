<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Catcher 🐶</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div id="playerDisplay"></div>
    <p>🏆 Global Highscore: <span id="globalHighscore"></span></p>
    <div id="hud">
        <div>score: <span class="hudC" id="score">0</span></div>
        <div>level: <span class="hudC" id="level">1</span></div>
        <div>highscore: <span class="hudC" id="highscore">0</span></div>
        <div>⏱️ time: <span class="hudC" id="time"></span>s</div>
    </div>
    <div id="gameArea">
        <div id="player"></div>
    </div>

    <div id="popup1" class="popup">
        <div class="popup-content">
            <span id="popupMessage">Your message here</span><br><br>
            <button id="viewLeaderboard">View Leaderboard</button>
            <button id="restartGame">Start new game</button>
            <button id="exitGame">Exit</button>
        </div>
    </div>

    <div id="popupIframe" class="popup">
        <div class="popup-content">
            <button id="closeIframe" class="popup-close">X</button>
            <iframe id="leaderboardIframe" src="leaderboard.html" width="100%" height="400px"></iframe>
        </div>
    </div>
    <script src="../js/game.js"></script>
</body>

</html>
